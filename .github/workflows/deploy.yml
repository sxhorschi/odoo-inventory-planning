name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and restart
        working-directory: /home/tytandev/inventory-overview
        run: |
          git pull origin main
          docker compose up -d --build
