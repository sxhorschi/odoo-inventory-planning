name: Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and restart
        working-directory: /home/tytandev/inventory-overview
        run: |
          git pull origin main
          docker compose up -d --build
