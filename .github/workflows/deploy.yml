name: Deploy

on:
  push:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and restart
        working-directory: /home/tytandev/inventory-overview
        run: |
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}
          docker compose up -d --build
